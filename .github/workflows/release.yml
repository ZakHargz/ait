name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Build for all platforms
      run: make build-all

    - name: Create checksums
      run: |
        cd dist
        sha256sum * > checksums.txt

    - name: Extract release notes
      id: extract-release-notes
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/ait-*
          dist/checksums.txt
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Update Homebrew Formula
      run: |
        # Calculate SHA256 for macOS ARM64 (M1/M2) build
        SHA256=$(sha256sum dist/ait-darwin-arm64 | awk '{print $1}')
        VERSION=${GITHUB_REF#refs/tags/v}
        
        echo "Version: $VERSION"
        echo "SHA256: $SHA256"
        echo ""
        echo "Update Formula/ait.rb with:"
        echo "  url: https://github.com/${{ github.repository }}/releases/download/v${VERSION}/ait-darwin-arm64"
        echo "  sha256: $SHA256"
        echo "  version: $VERSION"
