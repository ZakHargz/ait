# golangci-lint configuration
# https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    - errcheck      # Check for unchecked errors
    - gosimple      # Simplify code
    - govet         # Reports suspicious constructs
    - ineffassign   # Detect ineffectual assignments
    - staticcheck   # Go static analysis
    - unused        # Check for unused code
    - gofmt         # Check formatting
    - goimports     # Check imports
    - misspell      # Check for misspelled English words
    - revive        # Fast, configurable, extensible, flexible linter
    - gosec         # Security problems
    - gocyclo       # Cyclomatic complexity
    - dupl          # Code duplication
    - goconst       # Repeated strings that could be constants
    - unconvert     # Unnecessary type conversions
    - unparam       # Unused function parameters
    - prealloc      # Slice allocations that could be preallocated

linters-settings:
  gocyclo:
    min-complexity: 15  # Maximum cyclomatic complexity
  
  dupl:
    threshold: 100  # Minimum token count for duplication
  
  goconst:
    min-len: 3
    min-occurrences: 3
  
  misspell:
    locale: US
  
  revive:
    rules:
      - name: var-naming
        severity: warning
      - name: package-comments
        severity: warning
      - name: exported
        severity: warning

issues:
  exclude-rules:
    # Exclude some linters from running on tests files
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - dupl
        - gosec
    
    # Exclude known issues in legacy code
    - path: internal/sources/git\.go
      linters:
        - gocyclo

  max-issues-per-linter: 0
  max-same-issues: 0
